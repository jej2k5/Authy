<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Authy Express Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; }
    input { display: block; width: 100%; padding: 8px; margin: 6px 0 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button, .btn { display: inline-block; padding: 9px 18px; background: #0070f3; color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
    button:hover, .btn:hover { background: #005bb5; }
    .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; }
    .btn-outline:hover { background: #f5f5f5; }
    .error { color: #c00; font-size: 14px; }
    .card { border: 1px solid #eee; border-radius: 8px; padding: 20px; margin-top: 16px; }
    #user-panel { display: none; }
    hr { margin: 24px 0; border: none; border-top: 1px solid #eee; }
    .providers { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Authy — Express Example</h1>

  <!-- Login panel -->
  <div id="login-panel" class="card">
    <h2>Sign in</h2>
    <form id="login-form">
      <label>Username</label>
      <input name="username" placeholder="alice" autocomplete="username" required />
      <label>Password</label>
      <input name="password" type="password" placeholder="password123" autocomplete="current-password" required />
      <p class="error" id="login-error"></p>
      <button type="submit">Sign in with password</button>
    </form>
    <div id="oauth-buttons" class="providers"></div>
  </div>

  <!-- Authenticated panel -->
  <div id="user-panel" class="card">
    <h2>Signed in</h2>
    <p id="user-info"></p>
    <button id="me-btn">Fetch /api/me</button>
    <pre id="me-output" style="background:#f5f5f5;padding:12px;border-radius:4px;font-size:13px;margin-top:8px;display:none"></pre>
    <hr />
    <button id="logout-btn" class="btn-outline">Sign out</button>
  </div>

  <script>
    async function init() {
      // Check which providers are enabled
      const { providers } = await fetch('/api/providers').then(r => r.json());
      const container = document.getElementById('oauth-buttons');
      if (providers.includes('google')) {
        container.innerHTML += '<a href="/auth/google" class="btn btn-outline">Sign in with Google</a>';
      }
      if (providers.includes('m365')) {
        container.innerHTML += '<a href="/auth/m365" class="btn btn-outline">Sign in with M365</a>';
      }

      // Check if already logged in
      tryFetchUser();
    }

    async function tryFetchUser() {
      const res = await fetch('/api/me');
      if (res.ok) {
        const { user } = await res.json();
        showUser(user);
      }
    }

    function showUser(user) {
      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('user-panel').style.display = 'block';
      document.getElementById('user-info').textContent =
        `${user.name} (${user.email}) — provider: ${user.provider}`;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: form.get('username'), password: form.get('password') }),
      });
      const data = await res.json();
      if (res.ok) { showUser(data.user); }
      else { document.getElementById('login-error').textContent = data.error; }
    });

    document.getElementById('me-btn').addEventListener('click', async () => {
      const res = await fetch('/api/me');
      const data = await res.json();
      const pre = document.getElementById('me-output');
      pre.style.display = 'block';
      pre.textContent = JSON.stringify(data, null, 2);
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      document.getElementById('user-panel').style.display = 'none';
      document.getElementById('login-panel').style.display = 'block';
      document.getElementById('me-output').style.display = 'none';
    });

    init();
  </script>
</body>
</html>
